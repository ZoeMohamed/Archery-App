dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "image/logo_Alihsan Archery.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  
  assets:
    - image/logo_Alihsan Archery.png
    - image/image bantalan Target backround.jpg
