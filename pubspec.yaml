name: al_ihsan_archery
description: "A new Flutter project."
publish_to: 'none'
version: 3.0.0+3

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.18.0
  shared_preferences: ^2.2.0
  image_picker: ^1.0.7
  supabase_flutter: ^2.5.0
  http: ^1.2.0
  mobile_scanner: ^7.1.4
  qr_flutter: ^4.1.0
